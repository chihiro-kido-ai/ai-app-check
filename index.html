
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI校閲さん | プロフェッショナル日本語校正</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background-color: #fafdface;
            background-image: 
                radial-gradient(at 0% 0%, hsla(150, 100%, 98%, 1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(165, 100%, 99%, 1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(180, 100%, 98%, 1) 0, transparent 50%);
            background-attachment: fixed;
        }
        .grid-pattern {
            background-image: radial-gradient(#d1fae5 0.5px, transparent 0.5px);
            background-size: 24px 24px;
        }
        .glass-header {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        @keyframes scan {
            0%, 100% { top: 0%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="grid-pattern min-h-screen">
        <div id="root"></div>
    </div>
<!-- 修正後（ファイルをルートに出したならこれ） -->

</body>
</html>
